<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitaram Side Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07070a;
            --glass-bg: rgba(18, 18, 24, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #c084fc;
            /* Violet */
            --accent-gold: #fbbf24;
            /* Amber Gold */
            --accent-glow: rgba(192, 132, 252, 0.25);
            --purple-gold: linear-gradient(135deg, #c084fc 0%, #fbbf24 100%);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Animated Aura Background */
        body::before {
            content: '';
            position: fixed;
            top: -20%;
            right: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
            animation: flow 15s infinite alternate;
        }

        @keyframes flow {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-20%, 10%);
            }
        }

        .header {
            padding: 24px 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: var(--purple-gold);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 24px rgba(192, 132, 252, 0.3);
        }

        .brand-name {
            display: flex;
            flex-direction: column;
        }

        .brand-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-sub {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .search-container {
            position: relative;
            margin-top: 8px;
        }

        .search-box {
            width: 100%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 12px 16px 12px 42px;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        .search-box:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.4;
            font-size: 14px;
        }

        .nav-tabs {
            display: flex;
            padding: 0 20px 12px;
            gap: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .nav-tab {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.2s;
            padding-bottom: 8px;
            position: relative;
        }

        .nav-tab.active {
            color: var(--text);
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--purple-gold);
            border-radius: 2px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .breadcrumb {
            margin-bottom: 16px;
            font-size: 11px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .breadcrumb span {
            cursor: pointer;
        }

        .breadcrumb span:hover {
            color: var(--accent);
        }

        .list-item {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(10px);
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .item-icon {
            width: 32px;
            height: 32px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .item-sub {
            font-size: 11px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: 0.2s;
        }

        .list-item:hover .item-actions {
            opacity: 1;
        }

        .action-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--purple-gold);
            border-color: transparent;
            transform: scale(1.1);
        }

        /* Lock Screen */
        #lockOverlay {
            position: absolute;
            inset: 0;
            background: var(--bg-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .lock-icon {
            font-size: 56px;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 15px var(--accent-glow));
        }

        .lock-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .lock-msg {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>

<body>
    <div id="lockOverlay" style="display:none;">
        <div class="lock-icon">🔒</div>
        <div class="lock-title">Vault is Locked</div>
        <div class="lock-msg">
            अपने पासवर्ड और बुकमार्क्स देखने के लिए<br>एक्सटेंशन बटन दबाकर अनलॉक करें।
        </div>
    </div>

    <div class="header">
        <div class="logo-row">
            <div class="logo-icon">✨</div>
            <div class="brand-name">
                <div class="brand-title">सीताराम</div>
                <div class="brand-sub">Side Panel</div>
            </div>
            <div style="flex: 1; text-align: right;">
                <button id="refreshBtn"
                    style="background:none; border:none; color:var(--accent); cursor:pointer; font-size:16px;">🔄</button>
            </div>
        </div>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-box" placeholder="खोजें (Search)...">
        </div>
    </div>

    <div class="nav-tabs">
        <div class="nav-tab active" data-tab="bookmarks">🔖 Bookmarks</div>
        <div class="nav-tab" data-tab="mobiles">📱 Numbers</div>
    </div>

    <div class="content-area">
        <div id="bmBreadcrumb" class="breadcrumb">
            <span data-id="1">Home</span>
        </div>
        <div id="mainList">
            <!-- Items will be injected here -->
        </div>
    </div>

    <script src="sidepanel.js"></script>
</body>

</html>
