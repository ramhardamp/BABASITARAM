<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d1a">
<title>BABASITARAM Vault</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{--bg:#0d0d1a;--bg2:#13131f;--bg3:#1c1c2e;--accent:#7c5cfc;--accent2:#c084fc;--text1:#f1f5f9;--text2:#94a3b8;--text3:#475569;--green:#22d3a5;--red:#f87171;--yellow:#fbbf24;--border:rgba(255,255,255,.07)}
  html,body{height:100%;background:var(--bg);color:var(--text1);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}
  .screen{display:none;flex-direction:column;height:100vh;overflow:hidden}
  .screen.active{display:flex}
  /* Header */
  .hdr{padding:16px 16px 10px;display:flex;align-items:center;gap:10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
  .hdr-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#7c5cfc,#c084fc);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .hdr-title{font-size:16px;font-weight:800;color:var(--text1)}
  .hdr-sub{font-size:10px;color:var(--text3)}
  /* Lock screen */
  #lockScreen{justify-content:center;align-items:center;padding:24px;background:radial-gradient(ellipse at top,rgba(124,92,252,.08) 0%,var(--bg) 70%)}
  .lock-card{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:32px 24px;text-align:center}
  .lock-icon{font-size:52px;margin-bottom:16px}
  .lock-title{font-size:22px;font-weight:800;margin-bottom:6px}
  .lock-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
  .inp{width:100%;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;color:var(--text1);font-size:15px;outline:none;transition:border-color .2s}
  .inp:focus{border-color:var(--accent)}
  .btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;margin-top:14px}
  .btn-primary:active{transform:scale(.98);opacity:.9}
  .btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border);margin-top:10px}
  .btn-danger{background:rgba(248,113,113,.15);color:var(--red);border:1px solid rgba(248,113,113,.3);margin-top:10px}
  .err-msg{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}
  /* Main screen */
  #mainScreen{background:var(--bg)}
  .main-hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
  .main-hdr-left{flex:1}
  .main-hdr-title{font-size:15px;font-weight:800;color:var(--text1)}
  .main-hdr-sub{font-size:10px;color:var(--text3)}
  .hdr-btns{display:flex;gap:8px}
  .icon-btn{width:34px;height:34px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
  .search-wrap{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
  .search-inp{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text1);font-size:13px;outline:none}
  .entry-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .entry{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
  .entry:active{background:var(--bg3)}
  .entry-fav{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;flex-shrink:0}
  .entry-info{flex:1;min-width:0}
  .entry-title{font-size:13px;font-weight:700;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .entry-user{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .entry-acts{display:flex;gap:6px}
  .mini-btn{width:30px;height:30px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
  .fab{position:fixed;bottom:24px;right:20px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 6px 24px rgba(124,92,252,.45);display:flex;align-items:center;justify-content:center}
  .empty-state{padding:60px 20px;text-align:center;color:var(--text3)}
  .em-icon{font-size:42px;margin-bottom:12px}
  /* Panel (sheet) */
  .panel{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--border);border-radius:24px 24px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.175,.885,.32,1);z-index:100;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 -20px 60px rgba(0,0,0,.5)}
  .panel.open{transform:translateY(0)}
  .panel-drag{width:36px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:12px auto 0}
  .panel-hdr{padding:16px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);flex-shrink:0}
  .panel-title{font-size:16px;font-weight:800;flex:1}
  .back-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:10px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:600}
  .panel-body{padding:20px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
  .fg{margin-bottom:16px}
  .fl{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .fv{display:flex;align-items:center;gap:8px;background:var(--bg3);padding:10px 14px;border-radius:12px;border:1px solid var(--border)}
  /* Toast */
  #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(20,20,35,.97);color:#ccc;font-size:12px;font-weight:500;padding:8px 18px;border-radius:20px;z-index:999;border:1px solid rgba(124,92,252,.25);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s}
  #toast.show{opacity:1}
  /* Password strength */
  .str-bar{display:flex;gap:3px;margin-top:4px}
  .str-seg{flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.1)}
  .str-seg.filled.s{background:var(--red)}
  .str-seg.filled.m{background:var(--yellow)}
  .str-seg.filled.g{background:var(--green)}
  /* Setup */
  #setupScreen{justify-content:center;align-items:center;padding:24px;background:radial-gradient(ellipse at top,rgba(34,211,165,.06) 0%,var(--bg) 70%)}
  /* Overlay */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;display:none}
  .overlay.show{display:block}
  /* Breach badge */
  .breach-badge{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(248,113,113,.15);color:var(--red);font-weight:700}
  /* Bottom nav */
  .bottom-nav{display:flex;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
  .nav-btn{flex:1;padding:10px 0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--text3);font-size:9px;font-weight:600;transition:color .2s}
  .nav-btn.active{color:var(--accent)}
  .nav-btn .nav-icon{font-size:20px}
</style>
</head>
<body>

<!-- Setup Screen -->
<div class="screen" id="setupScreen">
  <div class="lock-card">
    <div class="lock-icon">🔐</div>
    <div class="lock-title">BABASITARAM Vault</div>
    <div class="lock-sub" style="margin-bottom:20px">Apna master password set karo</div>
    <input class="inp" type="password" id="newMaster" placeholder="Master Password (min 8 chars)" style="margin-bottom:10px">
    <input class="inp" type="password" id="confirmMaster" placeholder="Confirm Password">
    <div class="err-msg" id="setupErr"></div>
    <button class="btn btn-primary" onclick="doSetup()">🔐 Vault Create Karo</button>
  </div>
</div>

<!-- Lock Screen -->
<div class="screen active" id="lockScreen">
  <div class="lock-card" style="max-width:400px">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">BABASITARAM Vault</div>
    <div class="lock-sub">Master password enter karo</div>
    <input class="inp" type="password" id="masterInput" placeholder="Master Password" style="margin-bottom:0" onkeypress="if(event.key==='Enter')doUnlock()">
    <div class="err-msg" id="lockErr"></div>
    <button class="btn btn-primary" onclick="doUnlock()">🔓 Unlock Karo</button>
    <button class="btn btn-secondary" id="setupLinkBtn" onclick="showScreen('setupScreen')" style="margin-top:10px;display:none">+ Naya Vault Banao</button>
  </div>
</div>

<!-- Main Screen -->
<div class="screen" id="mainScreen">
  <div class="main-hdr">
    <div class="main-hdr-left">
      <div class="main-hdr-title">🔐 BABASITARAM Vault</div>
      <div class="main-hdr-sub" id="mainSub">Loading...</div>
    </div>
    <div class="hdr-btns">
      <button class="icon-btn" onclick="openPanel('addPanel')" title="Add">➕</button>
      <button class="icon-btn" onclick="doLock()" title="Lock">🔒</button>
    </div>
  </div>
  <div class="search-wrap">
    <input class="search-inp" type="search" id="searchInput" placeholder="🔍 Search..." oninput="renderEntries(this.value)">
  </div>
  <div class="entry-list" id="entryList">
    <div class="empty-state"><div class="em-icon">🔒</div><p>Loading...</p></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="setNavTab('all',this)"><span class="nav-icon">🔐</span>All</button>
    <button class="nav-btn" onclick="setNavTab('weak',this)"><span class="nav-icon">⚠️</span>Weak</button>
    <button class="nav-btn" onclick="setNavTab('starred',this)"><span class="nav-icon">⭐</span>Starred</button>
    <button class="nav-btn" onclick="openPanel('addPanel')"><span class="nav-icon">➕</span>Add</button>
    <button class="nav-btn" onclick="openPanel('ioPanel')"><span class="nav-icon">⇅</span>IO</button>
  </div>
</div>

<!-- Detail Panel -->
<div class="panel" id="detailPanel">
  <div class="panel-drag"></div>
  <div class="panel-hdr">
    <button class="back-btn" onclick="closePanel('detailPanel')">← Back</button>
    <div class="panel-title" id="detailTitle">Entry</div>
    <button class="icon-btn" id="detailStarBtn" onclick="toggleStar()">☆</button>
  </div>
  <div class="panel-body" id="detailBody"></div>
</div>

<!-- Add/Edit Panel -->
<div class="panel" id="addPanel">
  <div class="panel-drag"></div>
  <div class="panel-hdr">
    <button class="back-btn" onclick="closePanel('addPanel')">← Back</button>
    <div class="panel-title" id="addPanelTitle">Add Entry</div>
    <button class="icon-btn" onclick="doSaveEntry()">💾</button>
  </div>
  <div class="panel-body">
    <div class="fg"><div class="fl">Title *</div><input class="inp" id="fTitle" placeholder="Google, Facebook..."></div>
    <div class="fg"><div class="fl">URL</div><input class="inp" id="fUrl" placeholder="https://..." type="url"></div>
    <div class="fg"><div class="fl">Username / Email</div><input class="inp" id="fUser" placeholder="user@example.com" autocomplete="off"></div>
    <div class="fg"><div class="fl">Mobile</div><input class="inp" id="fMobile" placeholder="+91..." type="tel"></div>
    <div class="fg">
      <div class="fl">Password *</div>
      <div style="display:flex;gap:8px">
        <input class="inp" id="fPass" placeholder="Password" type="password" style="flex:1" oninput="updateStrength()" autocomplete="new-password">
        <button class="icon-btn" onclick="togglePwVis()">👁</button>
        <button class="icon-btn" onclick="quickGenPw()" title="Generate">⚡</button>
      </div>
      <div class="str-bar" style="margin-top:8px">
        <div class="str-seg" id="ss1"></div><div class="str-seg" id="ss2"></div>
        <div class="str-seg" id="ss3"></div><div class="str-seg" id="ss4"></div>
      </div>
    </div>
    <div class="fg"><div class="fl">Notes</div><textarea class="inp" id="fNotes" rows="3" placeholder="Optional notes..." style="resize:none"></textarea></div>
    <button class="btn btn-primary" onclick="doSaveEntry()" id="saveEntryBtn">💾 Save</button>
    <button class="btn btn-danger" id="deleteEntryBtn" onclick="doDeleteEntry()" style="display:none">🗑 Delete</button>
  </div>
</div>

<!-- IO Panel -->
<div class="panel" id="ioPanel">
  <div class="panel-drag"></div>
  <div class="panel-hdr">
    <button class="back-btn" onclick="closePanel('ioPanel')">← Back</button>
    <div class="panel-title">⇅ Import / Export</div>
  </div>
  <div class="panel-body">
    <div style="margin-bottom:14px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px">Export passwords as CSV:</div>
      <button class="btn btn-secondary" onclick="exportCSV()" style="margin-top:0">📤 Export CSV</button>
      <button class="btn btn-secondary" onclick="exportJSON()">📦 Export Encrypted JSON</button>
    </div>
    <div style="border-top:1px solid var(--border);padding-top:14px">
      <div style="font-size:12px;color:var(--text3);margin-bottom:10px">Import from file:</div>
      <input type="file" id="importFile" accept=".csv,.json" style="display:none" onchange="handleImport(this)">
      <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()" style="margin-top:0">📥 Import File Choose Karo</button>
      <div id="importStatus" style="margin-top:10px;font-size:12px;color:var(--green)"></div>
    </div>
  </div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeAllPanels()"></div>

<!-- Toast -->
<div id="toast"></div>

<script>
'use strict';

// ── Crypto (same as desktop) ──
const ENC = new TextEncoder(), DEC = new TextDecoder();
async function deriveKey(pw, salt) {
  const km = await crypto.subtle.importKey('raw', ENC.encode(pw), {name:'PBKDF2'}, false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:600000,hash:'SHA-256'}, km, {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']);
}
async function encrypt(text, pw) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(pw, salt);
  const ct   = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, ENC.encode(text));
  const packed = new Uint8Array(16+12+ct.byteLength);
  packed.set(salt,0); packed.set(iv,16); packed.set(new Uint8Array(ct),28);
  let bin=''; for(let i=0;i<packed.length;i+=8192) bin+=String.fromCharCode.apply(null,packed.subarray(i,i+8192));
  return btoa(bin);
}
async function decrypt(b64, pw) {
  const packed = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const salt=packed.slice(0,16), iv=packed.slice(16,28), ct=packed.slice(28);
  const key = await deriveKey(pw, salt);
  return DEC.decode(await crypto.subtle.decrypt({name:'AES-GCM',iv}, key, ct));
}

// ── State ──
let masterPw = null, entries = [], currentNavTab = 'all', editingId = null;
const STORAGE_KEY = 'babasitaram_vault_blob', HASH_KEY = 'babasitaram_vault_hash';

// ── Init ──
window.addEventListener('DOMContentLoaded', async () => {
  const hash = localStorage.getItem(HASH_KEY);
  if (!hash) {
    showScreen('setupScreen'); 
    document.getElementById('setupLinkBtn').style.display = '';
  } else {
    showScreen('lockScreen');
  }
});

// ── Screens ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── Setup ──
async function doSetup() {
  const pw = document.getElementById('newMaster').value;
  const cf = document.getElementById('confirmMaster').value;
  const err = document.getElementById('setupErr');
  if (pw.length < 8) { err.textContent = 'Minimum 8 characters chahiye'; return; }
  if (pw !== cf) { err.textContent = 'Passwords match nahi kar rahe'; return; }
  err.textContent = '';
  const hash = await encrypt('__VAULT_CANARY__', pw);
  localStorage.setItem(HASH_KEY, hash);
  masterPw = pw;
  entries = [];
  await saveEntries();
  showScreen('mainScreen');
  updateMain();
  showToast('✅ Vault successfully create ho gaya!');
}

// ── Unlock ──
async function doUnlock() {
  const pw = document.getElementById('masterInput').value;
  const err = document.getElementById('lockErr');
  if (!pw) { err.textContent = 'Password enter karo'; return; }
  err.textContent = 'Verifying...';
  try {
    const hash = localStorage.getItem(HASH_KEY);
    const canary = await decrypt(hash, pw);
    if (canary !== '__VAULT_CANARY__') throw new Error('wrong');
    masterPw = pw;
    await loadEntries();
    showScreen('mainScreen');
    updateMain();
    err.textContent = '';
  } catch {
    err.textContent = '❌ Wrong password! Dobara try karo.';
    document.getElementById('masterInput').value = '';
  }
}

// ── Lock ──
function doLock() {
  masterPw = null; entries = [];
  document.getElementById('masterInput').value = '';
  document.getElementById('lockErr').textContent = '';
  closeAllPanels();
  showScreen('lockScreen');
}

// ── Load/Save ──
async function loadEntries() {
  const blob = localStorage.getItem(STORAGE_KEY);
  if (!blob) { entries = []; return; }
  try {
    entries = JSON.parse(await decrypt(blob, masterPw));
  } catch { entries = []; }
}

async function saveEntries() {
  if (!masterPw) return;
  const blob = await encrypt(JSON.stringify(entries), masterPw);
  localStorage.setItem(STORAGE_KEY, blob);
  updateMain();
}

// ── UI Updates ──
function updateMain() {
  const sub = document.getElementById('mainSub');
  if (sub) sub.textContent = entries.length + ' entries • ' + entries.filter(e=>isBreach(e.password)).length + ' breach';
  renderEntries(document.getElementById('searchInput')?.value || '');
}

function isBreach(pw) {
  const common = ['password','123456','12345678','qwerty','abc123','111111','admin','letmein'];
  return common.includes((pw||'').toLowerCase()) || (pw||'').length < 6;
}

function getStrength(pw) {
  if (!pw) return 'weak';
  let s=0;
  if(pw.length>=8)s++; if(pw.length>=12)s++;
  if(/[A-Z]/.test(pw)&&/[a-z]/.test(pw))s++;
  if(/[0-9]/.test(pw))s++; if(/[^A-Za-z0-9]/.test(pw))s++;
  return s>=4?'strong':s>=2?'medium':'weak';
}

const COLORS=['#4f46e5','#059669','#dc2626','#d97706','#7c3aed','#0891b2','#ea580c'];
function getColor(s){ let h=0; for(let i=0;i<(s||'').length;i++) h=(h*31+s.charCodeAt(i))&0xffff; return COLORS[h%COLORS.length]; }

function setNavTab(tab, btn) {
  currentNavTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEntries(document.getElementById('searchInput').value || '');
}

function renderEntries(q = '') {
  const list = document.getElementById('entryList');
  let base = [...entries];
  if (currentNavTab === 'weak') base = base.filter(e => getStrength(e.password) !== 'strong');
  else if (currentNavTab === 'starred') base = base.filter(e => e.starred);
  if (q) {
    const ql = q.toLowerCase();
    base = base.filter(e => (e.title||'').toLowerCase().includes(ql) || (e.username||'').toLowerCase().includes(ql) || (e.url||'').toLowerCase().includes(ql));
  }
  if (!base.length) {
    list.innerHTML = `<div class="empty-state"><div class="em-icon">${q?'🔍':'🔒'}</div><p>${q?'Kuch nahi mila':'Koi entry nahi — + se add karo'}</p></div>`;
    return;
  }
  list.innerHTML = '';
  const frag = document.createDocumentFragment();
  base.forEach(e => {
    const color = getColor(e.title||e.url||e.id);
    const letter = ((e.title||e.url||'V')[0]).toUpperCase();
    const br = isBreach(e.password);
    const str = getStrength(e.password);
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `
      <div class="entry-fav" style="background:${color}">${letter}</div>
      <div class="entry-info">
        <div class="entry-title">${escH(e.title||'Untitled')} ${br?'<span class="breach-badge">⚠ Breach</span>':''}</div>
        <div class="entry-user">${escH(e.username||'—')} ${e.mobile?'• 📱':''}</div>
      </div>
      <div class="entry-acts">
        <button class="mini-btn" title="Copy">📋</button>
        <button class="mini-btn" title="Edit">✏️</button>
      </div>`;
    div.querySelector('.mini-btn:first-child').addEventListener('click', ev => {
      ev.stopPropagation();
      navigator.clipboard.writeText(e.password||'').then(()=>showToast('✓ Password copied!'));
    });
    div.querySelector('.mini-btn:last-child').addEventListener('click', ev => {
      ev.stopPropagation();
      openAddPanel(e);
    });
    div.addEventListener('click', () => openDetail(e.id));
    frag.appendChild(div);
  });
  list.appendChild(frag);
}

function openDetail(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  const str = getStrength(e.password);
  const fill = {weak:1,medium:2,strong:4}[str];
  const cls  = {weak:'s',medium:'m',strong:'g'}[str];
  const bars = [1,2,3,4].map(i=>`<div class="str-seg ${i<=fill?'filled '+cls:''}"></div>`).join('');
  document.getElementById('detailTitle').textContent = e.title||'Entry';
  document.getElementById('detailStarBtn').textContent = e.starred?'★':'☆';
  document.getElementById('detailStarBtn').dataset.id = id;
  document.getElementById('detailBody').innerHTML = `
    ${e.username?`<div class="fg"><div class="fl">Username</div><div class="fv"><span style="flex:1;font-size:13px">${escH(e.username)}</span><button class="mini-btn" onclick="copyText('${escH(e.username)}')">📋</button></div></div>`:''}
    ${e.mobile?`<div class="fg"><div class="fl">Mobile</div><div class="fv"><span style="flex:1;font-size:13px">${escH(e.mobile)}</span><button class="mini-btn" onclick="copyText('${escH(e.mobile)}')">📋</button></div></div>`:''}
    <div class="fg"><div class="fl">Password</div><div class="fv">
      <span id="dpw" data-pw="${escH(e.password||'')}" style="flex:1;font-family:monospace;font-size:13px">••••••••</span>
      <button class="mini-btn" id="dEye">👁</button>
      <button class="mini-btn" onclick="copyText('${escH(e.password||'')}')">📋</button>
    </div></div>
    <div class="fg"><div class="fl">Strength</div><div class="str-bar">${bars}</div></div>
    ${e.url?`<div class="fg"><div class="fl">URL</div><div class="fv"><span style="flex:1;font-size:12px;word-break:break-all">${escH(e.url)}</span></div></div>`:''}
    ${e.notes?`<div class="fg"><div class="fl">Notes</div><div class="fv"><span style="flex:1;font-size:12px">${escH(e.notes)}</span></div></div>`:''}
    <button class="btn btn-primary" onclick="openAddPanel(entries.find(x=>x.id==='${id}'));closePanel('detailPanel')">✏️ Edit</button>
    <button class="btn btn-danger" onclick="deleteEntry('${id}')">🗑 Delete</button>`;
  document.getElementById('dEye').addEventListener('click', () => {
    const el = document.getElementById('dpw');
    const vis = el.dataset.vis === '1';
    el.textContent = vis ? '••••••••' : el.dataset.pw;
    el.dataset.vis = vis ? '0' : '1';
    document.getElementById('dEye').textContent = vis ? '👁' : '🙈';
  });
  openPanel('detailPanel');
}

function toggleStar() {
  const id = document.getElementById('detailStarBtn').dataset.id;
  const e = entries.find(x => x.id === id);
  if (!e) return;
  e.starred = !e.starred;
  document.getElementById('detailStarBtn').textContent = e.starred ? '★' : '☆';
  saveEntries();
  showToast(e.starred ? '⭐ Starred!' : 'Star removed');
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  entries = entries.filter(e => e.id !== id);
  await saveEntries();
  closePanel('detailPanel');
  showToast('Deleted ✓');
}

// ── Add/Edit ──
let _editId = null;
function openAddPanel(entry = null) {
  _editId = entry ? entry.id : null;
  document.getElementById('addPanelTitle').textContent = entry ? 'Edit Entry' : 'Add Entry';
  document.getElementById('fTitle').value = entry?.title || '';
  document.getElementById('fUrl').value = entry?.url || '';
  document.getElementById('fUser').value = entry?.username || '';
  document.getElementById('fMobile').value = entry?.mobile || '';
  document.getElementById('fPass').value = entry?.password || '';
  document.getElementById('fNotes').value = entry?.notes || '';
  document.getElementById('deleteEntryBtn').style.display = entry ? '' : 'none';
  ['ss1','ss2','ss3','ss4'].forEach(id => { document.getElementById(id).className = 'str-seg'; });
  if (entry?.password) updateStrength();
  openPanel('addPanel');
}

async function doSaveEntry() {
  const title = document.getElementById('fTitle').value.trim();
  const pw    = document.getElementById('fPass').value;
  if (!title) { showToast('❌ Title required!', true); return; }
  if (!pw)    { showToast('❌ Password required!', true); return; }
  const now = Date.now();
  const entry = {
    id: _editId || (now + Math.random().toString(36).substring(2)),
    title, url: document.getElementById('fUrl').value.trim(),
    username: document.getElementById('fUser').value.trim(),
    mobile: document.getElementById('fMobile').value.trim(),
    password: pw,
    notes: document.getElementById('fNotes').value.trim(),
    strength: getStrength(pw),
    starred: false, createdAt: now, updatedAt: now
  };
  if (_editId) {
    const idx = entries.findIndex(e => e.id === _editId);
    if (idx >= 0) { entry.starred = entries[idx].starred; entry.createdAt = entries[idx].createdAt; entries[idx] = entry; }
  } else { entries.push(entry); }
  await saveEntries();
  closePanel('addPanel');
  showToast(_editId ? '✅ Updated!' : '✅ Saved!');
}

async function doDeleteEntry() {
  if (!_editId) return;
  if (!confirm('Delete karo?')) return;
  entries = entries.filter(e => e.id !== _editId);
  await saveEntries();
  closePanel('addPanel');
  showToast('Deleted ✓');
}

function updateStrength() {
  const pw = document.getElementById('fPass').value;
  const str = getStrength(pw);
  const fill = {weak:1,medium:2,strong:4}[str];
  const cls  = {weak:'s',medium:'m',strong:'g'}[str];
  [1,2,3,4].forEach(i => {
    const el = document.getElementById('ss'+i);
    el.className = 'str-seg' + (i<=fill ? ' filled '+cls : '');
  });
}

function togglePwVis() {
  const inp = document.getElementById('fPass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function quickGenPw() {
  const U='ABCDEFGHJKLMNPQRSTUVWXYZ', L='abcdefghjkmnpqrstuvwxyz', D='23456789', S='!@#$%&*';
  let p = U[~~(Math.random()*U.length)] + L[~~(Math.random()*L.length)] + D[~~(Math.random()*D.length)] + S[~~(Math.random()*S.length)];
  const all = U+L+D+S;
  for(let i=0;i<8;i++) p+=all[~~(Math.random()*all.length)];
  p = p.split('').sort(()=>Math.random()-.5).join('');
  document.getElementById('fPass').value = p;
  document.getElementById('fPass').type = 'text';
  updateStrength();
  showToast('⚡ Strong password generated!');
}

// ── Import/Export ──
function exportCSV() {
  if (!entries.length) { showToast('Koi entry nahi!', true); return; }
  const rows = ['name,url,username,mobile,password,notes'];
  entries.forEach(e => rows.push([e.title,e.url,e.username,e.mobile,e.password,e.notes].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',')));
  downloadFile(rows.join('\n'), 'BABASITARAM_vault_export.csv', 'text/csv');
  showToast('📤 CSV exported!');
}

async function exportJSON() {
  if (!entries.length) { showToast('Koi entry nahi!', true); return; }
  const encrypted = await encrypt(JSON.stringify(entries), masterPw);
  const data = JSON.stringify({vault_backup:true,v:2,data:encrypted,date:new Date().toISOString()});
  downloadFile(data, 'BABASITARAM_vault_backup.json', 'application/json');
  showToast('📦 Encrypted backup exported!');
}

function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const text = e.target.result;
    let imported = [];
    try {
      if (file.name.endsWith('.json')) {
        const data = JSON.parse(text);
        if (data.vault_backup && data.data) {
          const dec = await decrypt(data.data, masterPw);
          imported = JSON.parse(dec);
        } else { imported = data; }
      } else {
        const lines = text.split('\n').slice(1);
        lines.forEach(line => {
          if (!line.trim()) return;
          const cols = line.split(',').map(c => c.replace(/^"|"$/g,'').replace(/""/g,'"'));
          if (cols[4]) imported.push({id:Date.now()+Math.random().toString(36).substr(2),title:cols[0]||'',url:cols[1]||'',username:cols[2]||'',mobile:cols[3]||'',password:cols[4]||'',notes:cols[5]||''});
        });
      }
      const newCount = imported.filter(imp => !entries.some(e => e.username===imp.username && (e.url||'').includes((imp.url||'').split('/')[2]||'?'))).length;
      imported.forEach(imp => { if (!entries.some(e => e.id===imp.id)) { imp.id=imp.id||Date.now()+Math.random().toString(36).substr(2); entries.push(imp); } });
      await saveEntries();
      document.getElementById('importStatus').textContent = `✅ ${newCount} new entries imported!`;
      showToast(`✅ ${newCount} entries import ho gayi!`);
    } catch(err) {
      document.getElementById('importStatus').textContent = '❌ Import failed: ' + err.message;
      showToast('❌ Import failed!', true);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function downloadFile(content, name, type) {
  const blob = new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=name; a.click();
  URL.revokeObjectURL(url);
}

// ── Panel Utils ──
function openPanel(id) {
  document.getElementById(id).classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closePanel(id) {
  document.getElementById(id).classList.remove('open');
  const anyOpen = document.querySelectorAll('.panel.open').length;
  if (!anyOpen) document.getElementById('overlay').classList.remove('show');
}
function closeAllPanels() {
  document.querySelectorAll('.panel.open').forEach(p => p.classList.remove('open'));
  document.getElementById('overlay').classList.remove('show');
}

// ── Toast ──
let _toastTimer;
function showToast(msg, isErr=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isErr ? 'rgba(239,68,68,.95)' : 'rgba(20,20,35,.97)';
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Utils ──
function escH(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function copyText(t) { navigator.clipboard.writeText(t).then(()=>showToast('✓ Copied!')); }

// ── PWA Install ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; });
</script>
