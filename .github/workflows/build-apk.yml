name: Build BABASITARAM Vault APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Change wrapper permissions
        run: chmod +x ./AndroidProject/gradlew || echo "gradlew not found"

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.2'
          arguments: assembleDebug
          build-root-directory: AndroidProject


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BABASITARAM-Vault-APK
          path: AndroidProject/app/build/outputs/apk/debug/app-debug.apk
